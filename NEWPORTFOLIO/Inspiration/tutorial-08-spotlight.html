<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StringTune : Tutorial : Spotlight</title>
  <script src="https://unpkg.com/@fiddle-digital/string-tune@1.1.53/dist/index.js"></script>
  <style>
@property --progress {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

@property --spotlight-angle {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

@property --spotlight-distance {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

:root {
  --vh: 1vh;
  --vw: 1vw;
  --c-white: #ffffff;
  --c-black: #000000;
  --c-black-rgb: 0, 0, 0;
  --c-grey-dark: #333333;
  --c-grey-dark-rgba: 51, 51, 51;
  --c-grey: #999999;
  --c-red: #FF5A37;

  --easing-function: cubic-bezier(0.86, 0, 0.31, 1);
  --easing-function-2: cubic-bezier(0.35, 0.35, 0, 1);
  --easing-timing: 1.5s;

  --g-gap: 0.4rem;
  --g-margin: calc(var(--g-gap) * 2);

  --mm: 0.64rem;
  --m: 0.8rem;
  --p: 1rem;
  --h6: 1.25rem;
  --h5: 1.563rem;
  --h4: 1.953rem;
  --h3: 2.441rem;
  --h2: 3.052rem;
  --h1: 3.815rem;
  --h0: 5.065rem;
  --large: max(6.331rem, 18vw);
  
}
@media (min-width: 1024px) {
  :root {
    --g-margin: calc(var(--g-gap) * 4);
  }
}

html,
body,
* {
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  line-height: 1.25;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #808080;
  color: black;
}
.-w {
  margin-left: var(--g-margin);
  margin-right: var(--g-margin);
}
@media (min-width: 1024px) {
  html {
    font-size: 20px;
  }
}
body {
  position: relative;
  min-height: 100lvh;
}
.note {
  color: var(--c-white);
}
svg {
  display: block;
}
img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
button {
  border: none;
  margin: 0;
  padding: 0;
  position: relative;
  background-color: transparent;
  cursor: pointer;
  display: block;
  touch-action: manipulation;
  color: var(--c-white);
}

h1,
h2,
h3,
h3,
h4,
h5,
h6 {
  font-family: Arial, Helvetica, sans-serif;
  font-weight: normal;
}
.-lrg {
  font-size: var(--large);
}
.-h0 {
  font-size: var(--h0);
}
h1, .-h1 {
  font-size: var(--h1);
}
h2, .-h2 {
  font-size: var(--h2);
}
h3, .-h3 {
  font-size: var(--h3);
}
h4, .-h4 {
  font-size: var(--h4);
}
h5, .-h5 {
  font-size: var(--h5);
}
h6, .-h6 {
  font-size: var(--h6);
}
.-p {
  font-size: var(--p);
}
.-m {
  font-size: var(--m);
}
.-mm {
  font-size: var(--mm);
}
@media (max-width: 1600px) {
  .-mid-lrg {
    font-size: var(--large);
  }
  .-mid-h0 {
    font-size: var(--h0);
  }
  .-mid-h1 {
    font-size: var(--h1);
  }
  .-mid-h2 {
    font-size: var(--h2);
  }
  .-mid-h3 {
    font-size: var(--h3);
  }
  .-mid-h4 {
    font-size: var(--h4);
  }
  .-mid-h5 {
    font-size: var(--h5);
  }
  .-mid-h6 {
    font-size: var(--h6);
  }
  .-mid-p {
    font-size: var(--p);
  }
  .-mid-m {
    font-size: var(--m);
  }
  .-mid-mm {
    font-size: var(--mm);
  }
}

@media (max-width: 1024px) {
  .-m-lrg {
    font-size: var(--large);
  }
  .-m-h0 {
    font-size: var(--h0);
  }
  .-m-h1 {
    font-size: var(--h1);
  }
  .-m-h2 {
    font-size: var(--h2);
  }
  .-m-h3 {
    font-size: var(--h3);
  }
  .-m-h4 {
    font-size: var(--h4);
  }
  .-m-h5 {
    font-size: var(--h5);
  }
  .-m-h6 {
    font-size: var(--h6);
  }
  .-m-p {
    font-size: var(--p);
  }
  .-m-m {
    font-size: var(--m);
  }
  .-m-mm {
    font-size: var(--mm);
  }
}

.-up {
  text-transform: uppercase;
}
.-tac {
  text-align: center;
}

.-splitted {
  display: flex;
  flex-wrap: wrap;

  .-s-line {
    display: flex;
    will-change: contents;
  }
  .-s-word {
    display: inline-flex;
    will-change: contents;
  }
  .-s-char {
    display: inline-flex;
    will-change: contents;
  }
}

.-w {
  display: grid;
  grid-template-columns: repeat(14, 1fr);
  align-items: center;
  column-gap: var(--g-gap);
  min-height: calc(var(--vh, 1vh) * 100);
}

.card {
  grid-row-start: 1;
  grid-row-end: 2;
  grid-column-start: 2;
  grid-column-end: 14;
  background-color: #ffd23f;
  border-radius: var(--h5);
}

.character-wrap {
  width: 80%;
  margin: -20% auto 5%;

  display: grid;
  place-items: center;
}
.character-wrap svg {
  grid-area: 1 / 1;
  height: auto;
  aspect-ratio: 1/1;
  position: relative;
}

svg.body,
svg.face {
  scale: 1 1;
  transform: skewX(0deg);
  animation: cartoon-bounce 1.2s infinite ease-in-out;
  transform-origin: 50% 100%;
}
svg.body {
  animation-delay: -0.015s;
}

.eyes-wraper {
  position: relative;
  width: 100%;
  height: 100%;
  grid-area: 1 / 1;

  transform: skewX(0deg);
  animation: cartoon-bounce 1.2s infinite ease-in-out;
  transform-origin: 50% 100%;
  animation-delay: -0.0075s;
}
.eyes {
  width: 34%;
  height: 24%;
  margin: 18% 35% 0 31%;
  display: flex;
  justify-content: space-between;
}
.eye {
  width: 40%;
  height: 100%;
  background-color: var(--c-white);
  border: 0.2rem solid var(--c-black);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  will-change: transform;
}
.eye:first-child {
  margin-top: -5%;
}
.eye::after {
  content: '';
  display: block;
  width: 50%;
  height: 50%;
  border-radius: 50%;
  background-image: conic-gradient(from 5.5rad, var(--c-black) 300deg, var(--c-white) 300deg);
  will-change: transform;
}

@keyframes cartoon-bounce {
  0% {
    scale: 1 1;
    transform: skewX(0deg);
  }
  25% {
    scale: 1 0.95;
  }
  50% {
    scale: 1 1;
    transform: skewX(2deg);
  }
  75% {
    scale: 1 0.95;
  }
  100% {
    scale: 1 1;
    transform: skewX(0deg);
  }
}

@media (min-width: 1024px) {
  .card {
    grid-column-start: 6;
    grid-column-end: 10;
  }
  .eye {
    transform: translate(
      calc(sin(var(--spotlight-angle-deg)) * max(min(var(--spotlight-distance), 800), 0) * -0.0075%),
      calc(cos(var(--spotlight-angle-deg)) * max(min(var(--spotlight-distance), 600), 0) * 0.01%)
    );
  }
  .eye::after {
    transform: translate(
      calc(sin(var(--spotlight-angle-deg)) * max(min(var(--spotlight-distance), 800), 0) * -0.075%),
      calc(cos(var(--spotlight-angle-deg)) * max(min(var(--spotlight-distance), 600), 0) * 0.1%)
    );
  }
}
.note {
  grid-row-start: 1;
  grid-row-end: 2;
  grid-column-start: 1;
  grid-column-end: 15;
  justify-self: center;
  align-self: start;
  position: relative;
  z-index: 30;
  pointer-events: none;
  margin-top: var(--h0);
  background-color: var(--c-black);
}
</style>
</head>
